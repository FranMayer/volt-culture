name: Smoke Tests

on:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Vercel deploy
        env:
          # Apex (voltculture.com.ar) responde 307 → www; curl sin -L nunca ve 405.
          SMOKE_BASE_URL: https://www.voltculture.com.ar
        run: |
          set -euo pipefail
          URL="${SMOKE_BASE_URL%/}/api/webhook"
          MAX_ATTEMPTS=36
          DELAY_SEC=5
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" -X GET "$URL" || echo "000")
            if [ "$code" = "405" ]; then
              echo "Producción lista: GET $URL → $code (intento $i/$MAX_ATTEMPTS)"
              exit 0
            fi
            echo "Esperando deploy: GET $URL → HTTP $code ($i/$MAX_ATTEMPTS)"
            sleep "$DELAY_SEC"
          done
          echo "Timeout: el webhook no respondió 405 en $((MAX_ATTEMPTS * DELAY_SEC))s"
          exit 1

      - name: Run smoke tests (production)
        id: smoke
        env:
          SMOKE_RETRY_ATTEMPTS: 3
          SMOKE_RETRY_DELAY_MS: 3000
        run: |
          set -o pipefail
          npm run test:smoke:prod 2>&1 | tee smoke-output.txt

      - name: Report failure in job summary
        if: failure()
        run: |
          {
            echo "## Smoke tests failed"
            echo ""
            echo "Los smoke tests contra **https://www.voltculture.com.ar** fallaron después del deploy en \`main\`."
            echo ""
            echo "### Salida"
            echo '```'
            cat smoke-output.txt
            echo '```'
            echo ""
            echo "Revisá el deploy en Vercel y volvé a correr localmente con \`npm run test:smoke:prod\`."
          } >> "$GITHUB_STEP_SUMMARY"
