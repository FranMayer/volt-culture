<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" href="../images-brand/Isotipo color.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400&family=Teko:wght@700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Styles -->
    <link href="/css/style.css" rel="stylesheet" type="text/css">
    <link href="/css/mediaquery.css" rel="stylesheet" type="text/css">
    <link href="/css/volt-ds.css" rel="stylesheet" type="text/css">

    <title>VOLT — Mis Pedidos</title>

    <style>
        /* ── Layout ───────────────────────────────────────────── */
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .orders-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        .orders-page--empty {
            max-width: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--volt-ds-header-h, 112px));
            padding: 2rem 1rem;
        }

        .orders-page--empty .orders-heading {
            display: none !important;
        }

        .orders-page--empty #ordersList {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orders-page--load-error {
            max-width: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--volt-ds-header-h, 112px));
            padding: 2rem 1rem;
            text-align: center;
        }

        .orders-page--load-error .orders-subheading {
            display: block !important;
            max-width: 420px;
            margin: 0 auto 2rem;
            font-size: 1rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.65);
        }

        .orders-page--load-error #ordersList {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orders-heading {
            font-family: 'Teko', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #f2f2f2;
            margin: 0 0 0.15rem;
        }

        .orders-heading span { color: #E8192C; }

        .orders-subheading {
            color: rgba(242, 242, 242, 0.4);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            letter-spacing: 0.04em;
        }

        /* ── Loader ───────────────────────────────────────────── */
        #pageLoader {
            position: fixed;
            inset: 0;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(232, 25, 44, 0.25);
            border-top-color: #E8192C;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Estado vacío ─────────────────────────────────────── */
        .orders-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .orders-empty__icon {
            margin: 0 0 1.5rem;
            line-height: 0;
        }

        .orders-empty__icon svg {
            display: block;
            width: 72px;
            height: 72px;
        }

        .orders-empty__title {
            font-family: 'Teko', sans-serif;
            font-size: clamp(2.25rem, 7vw, 3.25rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0 0 0.75rem;
        }

        .orders-empty__desc {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.65);
            margin: 0 0 2rem;
        }

        .orders-empty__cta {
            display: inline-block;
            background: #c1121f;
            color: #ffffff;
            border: none;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.85rem 1.75rem;
            transition: background 0.2s, color 0.2s;
        }

        .orders-empty__cta:hover {
            background: #9b0e19;
            color: #ffffff;
        }

        .orders-empty__actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .orders-empty__retry {
            display: inline-block;
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.75rem 1.75rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }

        .orders-empty__retry:hover {
            border-color: rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        /* ── Tarjeta de orden ─────────────────────────────────── */
        .order-card {
            background: #141414;
            border: 1px solid rgba(255, 255, 255, 0.07);
            margin-bottom: 1.25rem;
            transition: border-color 0.2s;
        }

        .order-card:hover { border-color: rgba(232, 25, 44, 0.35); }

        .order-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 1.25rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .order-card__id {
            font-family: 'Teko', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #f2f2f2;
        }

        .order-card__date {
            font-size: 0.78rem;
            color: rgba(242, 242, 242, 0.35);
            margin-top: 0.1rem;
        }

        /* ── Badges de estado ─────────────────────────────────── */
        .order-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.65rem;
            border-radius: 2px;
            transition: color 0.35s ease, background-color 0.35s ease, border-color 0.35s ease;
        }

        .order-badge--paid            { background: rgba(45, 198, 83, 0.15);  color: #2dc653; border: 1px solid rgba(45,198,83,0.3); }
        .order-badge--pending         { background: rgba(240, 165, 0, 0.12);  color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
        .order-badge--pending_payment { background: rgba(240, 165, 0, 0.12);  color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
        .order-badge--failed          { background: rgba(232, 25, 44, 0.15);  color: #E8192C; border: 1px solid rgba(232,25,44,0.3); }
        .order-badge--mp_error        { background: rgba(232, 25, 44, 0.15);  color: #E8192C; border: 1px solid rgba(232,25,44,0.3); }

        /* ── Productos de la orden ────────────────────────────── */
        .order-card__items {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.88rem;
            color: rgba(242, 242, 242, 0.75);
            padding: 0.25rem 0;
        }

        .order-item__qty {
            color: rgba(242, 242, 242, 0.35);
            margin-left: 0.35rem;
            font-size: 0.8rem;
        }

        .order-item__price {
            color: rgba(242, 242, 242, 0.5);
            white-space: nowrap;
            margin-left: 1rem;
        }

        /* ── Pie de la tarjeta ────────────────────────────────── */
        .order-card__footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            gap: 0.75rem;
        }

        .order-card__total-label {
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(242, 242, 242, 0.35);
            margin-right: 0.6rem;
        }

        .order-card__total-amount {
            font-family: 'Teko', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #f2f2f2;
            letter-spacing: 0.04em;
        }

        .order-card__total-group {
            display: flex;
            align-items: center;
        }

        /* ── Botón repetir pedido ─────────────────────────────── */
        .btn-reorder {
            background: transparent;
            border: 1px solid rgba(193, 18, 31, 0.5);
            color: rgba(242, 242, 242, 0.7);
            font-family: 'Barlow', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.35rem 0.9rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .btn-reorder:hover {
            background: rgba(193, 18, 31, 0.15);
            border-color: #E8192C;
            color: #f2f2f2;
        }

        .btn-reorder--done {
            border-color: rgba(45, 198, 83, 0.5);
            color: #2dc653;
        }

        .btn-reorder--done:hover {
            background: rgba(45, 198, 83, 0.1);
            border-color: #2dc653;
            color: #2dc653;
        }

        /* ── Error de carga ───────────────────────────────────── */
        .orders-error {
            background: rgba(193, 18, 31, 0.1);
            border: 1px solid rgba(193, 18, 31, 0.3);
            color: rgba(242, 242, 242, 0.7);
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
        }
    </style>

<body>

    <!-- Loader mientras se verifica la sesión -->
    <div id="pageLoader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Overlay menú móvil -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Navbar -->
    <nav class="header" id="mainHeader">
        <a href="/index.html" class="logo-link logo-lockup" aria-label="VOLT — Inicio">
            <img class="site-logo site-logo--navbar"
                 src="../images-brand/Logo color y blanco.svg"
                 width="800" height="800"
                 alt="VOLT — Motorsport Culture">
        </a>

        <ul id="navMenu">
            <li><a href="/pages/catalogo.html" class="nav-link">Shop</a></li>
            <li><a href="/pages/about.html"    class="nav-link">Nosotros</a></li>
            <li><a href="/pages/envios.html"   class="nav-link">Envíos</a></li>
            <li><a href="/pages/novedades.html" class="nav-link">Novedades</a></li>
        </ul>

        <div class="header-actions">
            <div id="authNav" class="auth-nav"></div>
            <div class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="orders-page" id="pageContent" style="display:none;">
        <h1 class="orders-heading">Mis <span>Pedidos</span></h1>
        <p class="orders-subheading" id="ordersSubheading">Cargando tus pedidos...</p>
        <div id="ordersList"></div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/firebase-google-auth.js?v=popup2"></script>
    <script src="/js/store-auth.js?v=popup2"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/admin-access.js"></script>

    <script>
    (function () {
        'use strict';

        // ── Helpers ────────────────────────────────────────────────────────

        const STATUS_LABEL = {
            paid:            'Pagado',
            pending:         'Pendiente',
            pending_payment: 'En proceso',
            failed:          'Rechazado',
            mp_error:        'Error'
        };

        function statusBadge(status) {
            const label = STATUS_LABEL[status] || status || 'Desconocido';
            const cls   = `order-badge--${status}`;
            return `<span class="order-badge ${cls}">${label}</span>`;
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('es-AR', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        }

        function formatPrice(n) {
            return `$${Number(n || 0).toLocaleString('es-AR')}`;
        }

        // ── Render ─────────────────────────────────────────────────────────

        const PACKAGE_ICON_SVG = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path d="M24 28v14" stroke="#ffffff" stroke-width="1.75" stroke-linecap="round"/>
                <path d="M8 18l16-9 16 9-16 9-16-9Z" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M8 18v12l16 9 16-9V18" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M24 19V5" stroke="#ffffff" stroke-width="1.75" stroke-linecap="round"/>
                <path d="M8 18l16 9 16-9" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
            </svg>
        `.trim();

        function clearOrdersPageState() {
            document.getElementById('pageContent').classList.remove('orders-page--empty', 'orders-page--load-error');
        }

        function isNetworkError(err) {
            if (!err) return !navigator.onLine;
            const code = String(err.code || '').toLowerCase();
            const msg = String(err.message || '').toLowerCase();
            return (
                !navigator.onLine ||
                code === 'unavailable' ||
                code === 'deadline-exceeded' ||
                msg.includes('network') ||
                msg.includes('failed to get') ||
                msg.includes('quic') ||
                msg.includes('fetch') ||
                msg.includes('connection') ||
                msg.includes('offline') ||
                msg.includes('err_quic')
            );
        }

        function renderEmpty() {
            clearOrdersPageState();
            const page = document.getElementById('pageContent');
            page.classList.add('orders-page--empty');
            document.getElementById('ordersSubheading').style.display = 'none';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-empty" role="status">
                    <div class="orders-empty__icon">${PACKAGE_ICON_SVG}</div>
                    <h2 class="orders-empty__title">Todavía no hiciste ningún pedido</h2>
                    <p class="orders-empty__desc">Cuando compres algo, lo vas a ver acá.</p>
                    <a href="/pages/catalogo.html" class="orders-empty__cta">Ir al Shop →</a>
                </div>
            `;
        }

        function renderNetworkError() {
            clearOrdersPageState();
            document.getElementById('pageContent').classList.add('orders-page--load-error');
            const subheading = document.getElementById('ordersSubheading');
            subheading.style.display = '';
            subheading.textContent = 'No pudimos cargar tus pedidos. Revisá tu conexión e intentá de nuevo.';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-empty" role="alert">
                    <div class="orders-empty__icon">${PACKAGE_ICON_SVG}</div>
                    <div class="orders-empty__actions">
                        <button type="button" class="orders-empty__retry" id="ordersRetryBtn">Reintentar</button>
                    </div>
                </div>
            `;
            document.getElementById('ordersRetryBtn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }

        function renderError(msg) {
            if (isNetworkError({ message: msg })) {
                renderNetworkError();
                return;
            }
            clearOrdersPageState();
            document.getElementById('ordersSubheading').style.display = 'none';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-error">
                    ⚠️ ${msg || 'No pudimos cargar tus pedidos. Intentá de nuevo más tarde.'}
                </div>
            `;
        }

        function renderOrders(orders) {
            currentOrders = orders;
            const subheading = document.getElementById('ordersSubheading');
            const list       = document.getElementById('ordersList');

            if (orders.length === 0) { renderEmpty(); return; }

            clearOrdersPageState();
            subheading.style.display = '';
            subheading.textContent = `${orders.length} pedido${orders.length !== 1 ? 's' : ''}`;

            list.innerHTML = orders.map(order => {
                const items = Array.isArray(order.items) ? order.items : [];
                const itemsHtml = items.length
                    ? items.map(item => `
                        <div class="order-item">
                            <span>
                                ${item.title || 'Producto'}
                                <span class="order-item__qty">x${item.quantity || 1}</span>
                            </span>
                            <span class="order-item__price">
                                ${formatPrice((item.price || 0) * (item.quantity || 1))}
                            </span>
                        </div>`).join('')
                    : '<div class="order-item" style="color:rgba(242,242,242,0.3)">Sin detalle de productos</div>';

                return `
                <div class="order-card" data-order-id="${order.orderId}">
                    <div class="order-card__header">
                        <div>
                            <div class="order-card__id">${order.orderId || '—'}</div>
                            <div class="order-card__date">${formatDate(order.createdAt)}</div>
                        </div>
                        ${statusBadge(order.status)}
                    </div>
                    <div class="order-card__items">${itemsHtml}</div>
                    <div class="order-card__footer">
                        <button class="btn-reorder" data-order-id="${order.orderId}" type="button">
                            Repetir pedido
                        </button>
                        <div class="order-card__total-group">
                            <span class="order-card__total-label">Total</span>
                            <span class="order-card__total-amount">${formatPrice(order.total)}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Repetir pedido ────────────────────────────────────────────────

        // Guarda referencia a los pedidos actuales para el handler
        let currentOrders = [];

        function reorderItems(orderId) {
            const order = currentOrders.find(o => o.orderId === orderId);
            if (!order || !Array.isArray(order.items) || order.items.length === 0) return;

            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('cart')) || []; } catch { cart = []; }

            order.items.forEach(item => {
                const existing = cart.find(c => c.title === item.title);
                if (existing) {
                    existing.quantity += (item.quantity || 1);
                } else {
                    cart.push({
                        id: item.title,
                        title: item.title,
                        price: item.price || 0,
                        quantity: item.quantity || 1,
                        image: '',
                        variantColor: '',
                        variantSize: ''
                    });
                }
            });

            localStorage.setItem('cart', JSON.stringify(cart));
            window.dispatchEvent(new CustomEvent('cartUpdated'));
        }

        document.getElementById('ordersList').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-reorder');
            if (!btn || btn.disabled) return;

            const orderId = btn.getAttribute('data-order-id');
            reorderItems(orderId);

            btn.textContent = '✓ Agregado al carrito';
            btn.classList.add('btn-reorder--done');
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = 'Repetir pedido';
                btn.classList.remove('btn-reorder--done');
                btn.disabled = false;
            }, 2500);
        });

        // ── Listener de pedidos en tiempo real ────────────────────────────

        let unsubscribeOrders = null;

        function subscribeOrders(user) {
            const db = window.FirebaseConfig?.getDb();
            if (!db) { renderNetworkError(); return; }

            const sortByDate = (a, b) => (b.createdAt?.toMillis?.() ?? 0) - (a.createdAt?.toMillis?.() ?? 0);

            let firstSnapshot = true;

            unsubscribeOrders = db.collection('orders')
                .where('customer.email', '==', user.email)
                .onSnapshot(
                    (snap) => {
                        const orders = snap.docs.map(d => d.data()).sort(sortByDate);

                        // Primer snapshot → render completo
                        if (firstSnapshot) {
                            firstSnapshot = false;
                            renderOrders(orders);
                            return;
                        }

                        // Snapshots posteriores:
                        // Si hay docs añadidos o eliminados → re-render completo
                        const hasStructuralChange = snap.docChanges().some(c => c.type !== 'modified');
                        if (hasStructuralChange) {
                            renderOrders(orders);
                            return;
                        }

                        // Solo cambios de estado → actualizar únicamente el badge
                        snap.docChanges().forEach(change => {
                            const order = change.doc.data();
                            const card  = document.querySelector(`[data-order-id="${order.orderId}"]`);
                            if (!card) return;
                            const badge = card.querySelector('.order-badge');
                            if (!badge) return;
                            const label  = STATUS_LABEL[order.status] || order.status || 'Desconocido';
                            const newCls = `order-badge order-badge--${order.status}`;
                            if (badge.textContent !== label) badge.textContent = label;
                            if (badge.className   !== newCls) badge.className  = newCls;
                        });
                    },
                    (err) => {
                        console.error('[MisPedidos]', err);
                        if (isNetworkError(err)) {
                            renderNetworkError();
                        } else {
                            renderError(err?.message);
                        }
                    }
                );
        }

        function cleanup() {
            if (unsubscribeOrders) {
                unsubscribeOrders();
                unsubscribeOrders = null;
            }
        }

        // ── Auth gate ──────────────────────────────────────────────────────

        window.FirebaseConfig.init();

        firebase.auth().onAuthStateChanged((user) => {
            const loader  = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');

            if (!user) {
                cleanup();
                window.location.href = '/pages/catalogo.html';
                return;
            }

            loader.style.display  = 'none';
            content.style.display = 'block';

            subscribeOrders(user);
        });

        // Liberar el listener al salir de la página
        window.addEventListener('beforeunload', cleanup);
    })();
    </script>

</body>
