    <title>VOLT — Mis Pedidos</title>

    <style>
        /* ── Layout ───────────────────────────────────────────── */
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Glacial Indifference', 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .orders-page {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* Lista de pedidos: layout explícito cuando hay cards (evita flex residual de --empty) */
        #ordersList {
            display: block;
            width: 100%;
            visibility: visible;
            opacity: 1;
        }

        .orders-page:not(.orders-page--empty):not(.orders-page--load-error) {
            display: block;
        }

        .orders-page--empty {
            max-width: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--volt-ds-header-h, 112px));
            padding: 2rem 1rem;
        }

        .orders-page--empty .orders-heading {
            display: none !important;
        }

        .orders-page--empty #ordersList {
            flex: 1;
            width: 100%;
            min-height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orders-page--load-error {
            max-width: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--volt-ds-header-h, 112px));
            padding: 2rem 1rem;
            text-align: center;
        }

        .orders-page--load-error .orders-subheading {
            display: block !important;
            max-width: 420px;
            margin: 0 auto 2rem;
            font-size: 1rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.65);
        }

        .orders-page--load-error #ordersList {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orders-heading {
            font-family: 'Teko', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #f2f2f2;
            margin: 0 0 0.15rem;
        }

        .orders-heading span { color: #c1121f; }

        .orders-subheading {
            color: rgba(242, 242, 242, 0.4);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            letter-spacing: 0.04em;
        }

        /* ── Loader ───────────────────────────────────────────── */
        #pageLoader {
            position: fixed;
            inset: 0;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(193, 18, 31, 0.25);
            border-top-color: #c1121f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Estado vacío ─────────────────────────────────────── */
        .orders-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .orders-empty__icon {
            margin: 0 0 1.5rem;
            line-height: 0;
        }

        .orders-empty__icon svg {
            display: block;
            width: 72px;
            height: 72px;
        }

        .orders-empty__title {
            font-family: 'Teko', sans-serif;
            font-size: clamp(2.25rem, 7vw, 3.25rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0 0 0.75rem;
        }

        .orders-empty__desc {
            font-family: 'Glacial Indifference', 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.65);
            margin: 0 0 2rem;
        }

        .orders-empty__cta {
            display: inline-block;
            background: #c1121f;
            color: #ffffff;
            border: none;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.85rem 1.75rem;
            transition: background 0.2s, color 0.2s;
        }

        .orders-empty__cta:hover {
            background: #c40018;
            color: #ffffff;
        }

        .orders-empty__cta:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 3px;
        }

        .orders-empty__actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .orders-empty__retry {
            display: inline-block;
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.75rem 1.75rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }

        .orders-empty__retry:hover {
            border-color: rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        /* ── Tarjeta de orden ─────────────────────────────────── */
        .order-card {
            background: #141414 !important;
            color: #f2f2f2;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            margin-bottom: 1.25rem;
            transition: border-color 0.2s;
            position: relative;
            z-index: 1;
        }

        .order-card:hover { border-color: rgba(193, 18, 31, 0.35); }

        .order-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 1.25rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .order-card__id {
            font-family: 'Teko', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #f2f2f2;
        }

        .order-card__date {
            font-size: 0.78rem;
            color: rgba(242, 242, 242, 0.35);
            margin-top: 0.1rem;
        }

        /* ── Badges de estado ─────────────────────────────────── */
        .order-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.65rem;
            border-radius: 2px;
            transition: color 0.35s ease, background-color 0.35s ease, border-color 0.35s ease;
        }

        .order-badge--paid            { background: rgba(45, 198, 83, 0.15);  color: #2dc653; border: 1px solid rgba(45,198,83,0.3); }
        .order-badge--pending         { background: rgba(240, 165, 0, 0.12);  color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
        .order-badge--pending_payment { background: rgba(240, 165, 0, 0.12);  color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
        .order-badge--failed          { background: rgba(193, 18, 31, 0.15);  color: #c1121f; border: 1px solid rgba(193, 18, 31,0.3); }
        .order-badge--mp_error        { background: rgba(193, 18, 31, 0.15);  color: #c1121f; border: 1px solid rgba(193, 18, 31,0.3); }

        /* ── Productos de la orden ────────────────────────────── */
        .order-card__items {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.88rem;
            color: rgba(242, 242, 242, 0.75);
            padding: 0.25rem 0;
        }

        .order-item__qty {
            color: rgba(242, 242, 242, 0.35);
            margin-left: 0.35rem;
            font-size: 0.8rem;
        }

        .order-item__price {
            color: rgba(242, 242, 242, 0.5);
            white-space: nowrap;
            margin-left: 1rem;
        }

        /* ── Envío en la tarjeta ──────────────────────────────── */
        .order-card__shipping {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            line-height: 1.45;
            color: rgba(242, 242, 242, 0.75);
        }

        .order-card__ship-line {
            margin-bottom: 0.35rem;
        }

        .order-card__ship-line:last-child {
            margin-bottom: 0;
        }

        .order-card__ship-address {
            margin: 0.35rem 0 0.5rem;
            padding-left: 0.5rem;
            border-left: 2px solid rgba(193, 18, 31, 0.45);
            color: rgba(242, 242, 242, 0.6);
            font-size: 0.8rem;
        }

        .order-card__shipping a {
            color: #c1121f;
            text-decoration: underline;
        }

        .order-card__shipping a:hover {
            color: #ff4d5e;
        }

        /* ── Pie de la tarjeta ────────────────────────────────── */
        .order-card__footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            gap: 0.75rem;
        }

        .order-card__total-label {
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(242, 242, 242, 0.35);
            margin-right: 0.6rem;
        }

        .order-card__total-amount {
            font-family: 'Teko', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #f2f2f2;
            letter-spacing: 0.04em;
        }

        .order-card__total-group {
            display: flex;
            align-items: center;
        }

        /* ── Botón repetir pedido ─────────────────────────────── */
        .btn-reorder {
            background: transparent;
            border: 1px solid rgba(193, 18, 31, 0.5);
            color: rgba(242, 242, 242, 0.7);
            font-family: 'Barlow', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.35rem 0.9rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .btn-reorder:hover {
            background: rgba(193, 18, 31, 0.15);
            border-color: #c1121f;
            color: #f2f2f2;
        }

        .btn-reorder--done {
            border-color: rgba(45, 198, 83, 0.5);
            color: #2dc653;
        }

        .btn-reorder--done:hover {
            background: rgba(45, 198, 83, 0.1);
            border-color: #2dc653;
            color: #2dc653;
        }

        /* ── Error de carga ───────────────────────────────────── */
        .orders-error {
            background: rgba(193, 18, 31, 0.1);
            border: 1px solid rgba(193, 18, 31, 0.3);
            color: rgba(242, 242, 242, 0.7);
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    (function () {
        'use strict';

        // ── Helpers ────────────────────────────────────────────────────────

        const STATUS_LABEL = {
            paid:            'Pagado',
            pending:         'Pendiente',
            pending_payment: 'En proceso',
            failed:          'Rechazado',
            mp_error:        'Error',
            shipped:         'Enviado',
            delivered:       'Entregado',
            cancelled:       'Cancelado'
        };

        function escHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, (c) => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        function statusBadge(status) {
            const key = String(status || 'pending').trim().toLowerCase().replace(/[^a-z0-9_]/g, '_') || 'pending';
            const label = STATUS_LABEL[key] || STATUS_LABEL[status] || status || 'Desconocido';
            const cls   = STATUS_LABEL[key] !== undefined ? `order-badge--${key}` : 'order-badge--pending';
            return `<span class="order-badge ${cls}">${escHtml(label)}</span>`;
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                if (Number.isNaN(date.getTime())) return '—';
                return date.toLocaleDateString('es-AR', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
            } catch {
                return '—';
            }
        }

        function formatPrice(n) {
            return `$${Number(n || 0).toLocaleString('es-AR')}`;
        }

        /** Campos esperados del order-card: orderId, createdAt, status, items[{id,title,quantity,price}], total */
        function normalizeOrder(raw, docId) {
            const order = { ...(raw && typeof raw === 'object' ? raw : {}) };
            order.orderId = String(order.orderId || order.id || docId || '').trim();
            order.status = String(order.status || 'pending').trim() || 'pending';

            let items = order.items;
            if (items != null && !Array.isArray(items)) {
                items = [];
            }
            order.items = (items || []).map((item) => {
                const row = item && typeof item === 'object' ? item : {};
                return {
                    id: String(row.id || row.productId || '').trim(),
                    title: row.title || row.name || 'Producto',
                    quantity: Math.max(1, Number(row.quantity) || 1),
                    price: Number(row.price) || 0,
                    variantSize: row.variantSize || '',
                    variantColor: row.variantColor || ''
                };
            });

            let total = Number(order.total);
            if (Number.isNaN(total)) {
                total = order.items.reduce((sum, item) => sum + item.price * item.quantity, 0);
            }
            order.total = total;
            return order;
        }

        function isLegacyOrIncompleteOrder(raw, docId) {
            if (!raw || typeof raw !== 'object') return true;
            const id = String(raw.orderId || raw.id || docId || '').trim();
            if (!id) return true;
            if (raw.test === true || raw.isTest === true || raw.legacy === true) return true;
            if (/^test[-_]/i.test(id)) return true;
            if (raw.items != null && !Array.isArray(raw.items)) return true;
            return false;
        }

        const LEGACY_SHIPPING_METHOD_LABELS = {
            cadete: 'Cadete (Córdoba Capital)',
            andreani: 'Andreani / Interior',
            correo: 'Correo Argentino',
            coordinar: 'Coordinar entrega'
        };

        function appendShippingAddressLines(lines, address) {
            if (!address || typeof address !== 'object') return;
            const street = String(address.street || '').trim();
            const city = String(address.city || '').trim();
            const province = String(address.province || '').trim();
            const postalCode = String(address.postalCode || '').trim();
            if (!street && !city && !province && !postalCode) return;

            const parts = [];
            if (street) parts.push(escHtml(street));
            if (city || province) {
                parts.push(escHtml([city, province].filter(Boolean).join(', ')));
            }
            if (postalCode) parts.push(`CP ${escHtml(postalCode)}`);
            lines.push(`<div class="order-card__ship-address">${parts.join('<br>')}</div>`);
        }

        function appendShippingTrackingLine(lines, orderStatus, trackingNumber) {
            if (String(orderStatus || '').toLowerCase() !== 'shipped') return;
            const tn = String(trackingNumber || '').trim();
            if (!tn) return;
            const trackUrl =
                'https://www.andreani.com/personas/rastrearEnvio?claveDeRastreo=' +
                encodeURIComponent(tn);
            lines.push(
                `<div class="order-card__ship-line"><strong>Seguimiento:</strong> ` +
                `<a href="${trackUrl}" target="_blank" rel="noopener noreferrer">${escHtml(tn)}</a></div>`
            );
        }

        /** Bloque de envío; cadena vacía si no hay datos reconocibles. */
        function buildOrderShippingHtml(order) {
            const s = order.shipping;
            if (!s || typeof s !== 'object') return '';

            const type = String(s.type || '').trim().toLowerCase();
            const method = String(s.method || '').trim().toLowerCase();
            const status = String(order.status || '').trim().toLowerCase();
            const lines = [];

            if (type === 'cordoba') {
                const costLabel =
                    s.cost != null && !Number.isNaN(Number(s.cost))
                        ? formatPrice(s.cost)
                        : '$2.500';
                lines.push(
                    `<div class="order-card__ship-line"><strong>Envío:</strong> Córdoba Capital — ${costLabel}</div>`
                );
            } else if (type === 'andreani') {
                lines.push(
                    '<div class="order-card__ship-line"><strong>Envío:</strong> Andreani / Interior — A coordinar</div>'
                );
                appendShippingAddressLines(lines, s.address);
                appendShippingTrackingLine(lines, status, s.trackingNumber);
            } else if (method && LEGACY_SHIPPING_METHOD_LABELS[method]) {
                lines.push(
                    `<div class="order-card__ship-line"><strong>Envío:</strong> ${escHtml(LEGACY_SHIPPING_METHOD_LABELS[method])}</div>`
                );
                if (method === 'andreani' || method === 'correo') {
                    appendShippingAddressLines(lines, s.address);
                }
                appendShippingTrackingLine(lines, status, s.trackingNumber);
            } else {
                return '';
            }

            if (!lines.length) return '';
            return `<div class="order-card__shipping">${lines.join('')}</div>`;
        }

        function buildOrderCardHtml(order) {
            const orderId = escHtml(order.orderId);
            const items = order.items;
            const itemsHtml = items.length
                ? items.map((item) => `
                    <div class="order-item">
                        <span>
                            ${escHtml(item.title)}
                            <span class="order-item__qty">x${item.quantity}</span>
                        </span>
                        <span class="order-item__price">
                            ${formatPrice(item.price * item.quantity)}
                        </span>
                    </div>`).join('')
                : '<div class="order-item" style="color:rgba(242,242,242,0.3)">Sin detalle de productos</div>';

            return `
            <div class="order-card" data-order-id="${orderId}">
                <div class="order-card__header">
                    <div>
                        <div class="order-card__id">${orderId}</div>
                        <div class="order-card__date">${formatDate(order.createdAt)}</div>
                    </div>
                    ${statusBadge(order.status)}
                </div>
                <div class="order-card__items">${itemsHtml}</div>
                ${buildOrderShippingHtml(order)}
                <div class="order-card__footer">
                    <button class="btn-reorder" data-order-id="${orderId}" type="button">
                        Repetir pedido
                    </button>
                    <div class="order-card__total-group">
                        <span class="order-card__total-label">Total</span>
                        <span class="order-card__total-amount">${formatPrice(order.total)}</span>
                    </div>
                </div>
            </div>`;
        }

        // ── Render ─────────────────────────────────────────────────────────

        const PACKAGE_ICON_SVG = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path d="M24 28v14" stroke="#ffffff" stroke-width="1.75" stroke-linecap="round"/>
                <path d="M8 18l16-9 16 9-16 9-16-9Z" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M8 18v12l16 9 16-9V18" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M24 19V5" stroke="#ffffff" stroke-width="1.75" stroke-linecap="round"/>
                <path d="M8 18l16 9 16-9" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round"/>
            </svg>
        `.trim();

        function clearOrdersPageState() {
            document.getElementById('pageContent').classList.remove('orders-page--empty', 'orders-page--load-error');
        }

        function isNetworkError(err) {
            if (!err) return !navigator.onLine;
            const code = String(err.code || '').toLowerCase();
            const msg = String(err.message || '').toLowerCase();
            return (
                !navigator.onLine ||
                code === 'unavailable' ||
                code === 'deadline-exceeded' ||
                msg.includes('network') ||
                msg.includes('failed to get') ||
                msg.includes('quic') ||
                msg.includes('fetch') ||
                msg.includes('connection') ||
                msg.includes('offline') ||
                msg.includes('err_quic')
            );
        }

        function renderEmpty() {
            const page = document.getElementById('pageContent');
            const subheading = document.getElementById('ordersSubheading');
            clearOrdersPageState();
            page.classList.add('orders-page--empty');
            subheading.hidden = true;
            subheading.style.display = 'none';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-empty" role="status">
                    <div class="orders-empty__icon" aria-hidden="true">${PACKAGE_ICON_SVG}</div>
                    <h2 class="orders-empty__title">Todavía no hiciste ningún pedido</h2>
                    <p class="orders-empty__desc">Cuando compres en la tienda, vas a ver el detalle y el estado de envío acá.</p>
                    <a href="/pages/catalogo.html" class="orders-empty__cta">Ir a la tienda</a>
                </div>
            `;
        }

        function renderNetworkError() {
            clearOrdersPageState();
            document.getElementById('pageContent').classList.add('orders-page--load-error');
            const subheading = document.getElementById('ordersSubheading');
            subheading.hidden = false;
            subheading.style.display = '';
            subheading.textContent = 'No pudimos cargar tus pedidos. Revisá tu conexión e intentá de nuevo.';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-empty" role="alert">
                    <div class="orders-empty__icon">${PACKAGE_ICON_SVG}</div>
                    <div class="orders-empty__actions">
                        <button type="button" class="orders-empty__retry" id="ordersRetryBtn">Reintentar</button>
                    </div>
                </div>
            `;
            document.getElementById('ordersRetryBtn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }

        function renderError(msg) {
            if (isNetworkError({ message: msg })) {
                renderNetworkError();
                return;
            }
            clearOrdersPageState();
            const subheading = document.getElementById('ordersSubheading');
            subheading.hidden = true;
            subheading.style.display = 'none';
            document.getElementById('ordersList').innerHTML = `
                <div class="orders-error">
                    ${msg || 'No pudimos cargar tus pedidos. Intentá de nuevo más tarde.'}
                </div>
            `;
        }

        function renderOrders(ordersWithMeta) {
            const subheading = document.getElementById('ordersSubheading');
            const list       = document.getElementById('ordersList');

            if (ordersWithMeta.length === 0) { renderEmpty(); return; }

            const cards = [];
            const normalizedOrders = [];

            for (const entry of ordersWithMeta) {
                const raw = entry.data;
                const docId = entry.docId;
                try {
                    if (isLegacyOrIncompleteOrder(raw, docId)) {
                        continue;
                    }
                    const order = normalizeOrder(raw, docId);
                    cards.push(buildOrderCardHtml(order));
                    normalizedOrders.push(order);
                } catch { /* pedido malformado */ }
            }

            if (cards.length === 0) {
                renderEmpty();
                return;
            }

            currentOrders = normalizedOrders;
            clearOrdersPageState();
            list.style.display = 'block';
            list.style.visibility = 'visible';
            list.style.opacity = '1';
            subheading.hidden = false;
            subheading.style.display = '';
            subheading.textContent = `${cards.length} pedido${cards.length !== 1 ? 's' : ''}`;
            list.innerHTML = cards.join('');
        }


        // ── Repetir pedido ────────────────────────────────────────────────

        // Guarda referencia a los pedidos actuales para el handler
        let currentOrders = [];

        function reorderItems(orderId) {
            const order = currentOrders.find(o => o.orderId === orderId);
            if (!order || !Array.isArray(order.items) || order.items.length === 0) return;

            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('cart')) || []; } catch { cart = []; }

            order.items.forEach(item => {
                const productId = String(item.id || item.productId || '').trim();
                const existing = productId
                    ? cart.find(c => c.id === productId)
                    : cart.find(c => !c.id && c.title === item.title);
                if (existing) {
                    existing.quantity += (item.quantity || 1);
                    if (productId && !existing.id) existing.id = productId;
                } else {
                    cart.push({
                        id: productId,
                        title: item.title,
                        price: item.price || 0,
                        quantity: item.quantity || 1,
                        image: item.image || '',
                        variantColor: item.variantColor || '',
                        variantSize: item.variantSize || ''
                    });
                }
            });

            localStorage.setItem('cart', JSON.stringify(cart));
            window.dispatchEvent(new CustomEvent('cartUpdated'));
        }

        document.getElementById('ordersList').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-reorder');
            if (!btn || btn.disabled) return;

            const orderId = btn.getAttribute('data-order-id');
            reorderItems(orderId);

            btn.textContent = 'Agregado al carrito';
            btn.classList.add('btn-reorder--done');
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = 'Repetir pedido';
                btn.classList.remove('btn-reorder--done');
                btn.disabled = false;
            }, 2500);
        });

        // ── Listener de pedidos en tiempo real ────────────────────────────

        let unsubscribeOrders = null;

        function subscribeOrders(user) {
            const db = window.FirebaseConfig?.getDb();
            if (!db) {
                renderNetworkError();
                return;
            }

            const sortByDate = (a, b) => {
                const ta = a.data?.createdAt?.toMillis?.() ?? 0;
                const tb = b.data?.createdAt?.toMillis?.() ?? 0;
                return tb - ta;
            };

            let firstSnapshot = true;

            unsubscribeOrders = db.collection('orders')
                .where('customer.email', '==', user.email)
                .onSnapshot(
                    (snap) => {
                        const orders = snap.docs
                            .map((d) => ({ docId: d.id, data: d.data() }))
                            .sort(sortByDate);

                        // Primer snapshot → render completo
                        if (firstSnapshot) {
                            firstSnapshot = false;
                            renderOrders(orders);
                            return;
                        }

                        // Snapshots posteriores:
                        // Si hay docs añadidos o eliminados → re-render completo
                        const hasStructuralChange = snap.docChanges().some(c => c.type !== 'modified');
                        if (hasStructuralChange) {
                            renderOrders(orders);
                            return;
                        }

                        // Solo cambios de estado → actualizar únicamente el badge
                        snap.docChanges().forEach(change => {
                            const order = change.doc.data();
                            const orderId = order.orderId || change.doc.id;
                            const card  = document.querySelector(`[data-order-id="${orderId}"]`);
                            if (!card) return;
                            const badge = card.querySelector('.order-badge');
                            if (!badge) return;
                            const label  = STATUS_LABEL[order.status] || order.status || 'Desconocido';
                            const newCls = `order-badge order-badge--${order.status}`;
                            if (badge.textContent !== label) badge.textContent = label;
                            if (badge.className   !== newCls) badge.className  = newCls;
                        });
                    },
                    (err) => {
                        if (isNetworkError(err)) {
                            renderNetworkError();
                        } else {
                            renderError(err?.message);
                        }
                    }
                );
        }

        function cleanup() {
            if (unsubscribeOrders) {
                unsubscribeOrders();
                unsubscribeOrders = null;
            }
        }

        // ── Auth gate ──────────────────────────────────────────────────────

        window.FirebaseConfig.init();

        firebase.auth().onAuthStateChanged(async (user) => {
            const loader  = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');

            if (!user) {
                cleanup();
                content.style.display = 'none';
                loader.style.display = '';

                if (!window.VoltStoreAuth?.requireAuth) {
                    window.location.href = '/pages/catalogo.html';
                    return;
                }

                const authedUser = await window.VoltStoreAuth.requireAuth();
                if (!authedUser) {
                    window.location.href = '/pages/catalogo.html';
                }
                return;
            }

            loader.style.display  = 'none';
            content.style.display = 'block';

            subscribeOrders(user);
        });

        // Liberar el listener al salir de la página
        window.addEventListener('beforeunload', cleanup);
    })();
    </script>

</body>
