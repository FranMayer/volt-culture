            background-color: #fff;

            max-width: 600px;

        .brand-mark {
            display: block;
            margin: 0 auto 1.25rem;
            max-height: 44px;
            width: auto;
            object-fit: contain;
        }

        h1 {
            color: #ff9800;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #009cde;
            color: white;
            padding: 10px 20px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #007bb5;
