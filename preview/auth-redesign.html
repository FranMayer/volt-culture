<!doctype html>
<html lang="es" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VOLT · Ingresar (rediseño)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0A0A0A', surface: '#111111', surface2: '#161616',
            line: '#262626', lineStrong: '#3A3A3A',
            ink: '#FFFFFF', ink2: '#A3A3A3', ink3: '#6B6B6B',
            accent: '#E5142A', accentHover: '#F4283A', accentPress: '#C1121F',
            danger: '#F4283A',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          borderRadius: { modal: '16px', field: '12px' },
          boxShadow: {
            modal: '0 24px 64px -16px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.04)',
            focus: '0 0 0 4px rgba(229,20,42,.30)',
            cta: '0 10px 30px -10px rgba(229,20,42,.55)',
          },
          transitionTimingFunction: { soft: 'cubic-bezier(.16,1,.3,1)' },
          keyframes: {
            modalIn: { '0%': { opacity: 0, transform: 'translateY(8px) scale(.985)' },
                       '100%': { opacity: 1, transform: 'translateY(0) scale(1)' } },
            fade:    { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            shake:   { '0%,100%': { transform: 'translateX(0)' },
                       '20%,60%': { transform: 'translateX(-4px)' },
                       '40%,80%': { transform: 'translateX(4px)' } },
          },
          animation: {
            modalIn: 'modalIn .28s cubic-bezier(.16,1,.3,1)',
            fade: 'fade .2s ease-out',
            shake: 'shake .35s ease-in-out',
          },
        },
      },
    };
  </script>
  <style>
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body class="min-h-screen bg-bg font-sans text-ink antialiased
             flex items-center justify-center p-4
             [background-image:linear-gradient(#ffffff08_1px,transparent_1px),linear-gradient(90deg,#ffffff08_1px,transparent_1px)]
             [background-size:80px_80px]">

  <!-- Overlay + Modal -->
  <div class="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm" aria-hidden="true"></div>

  <div role="dialog" aria-modal="true" aria-labelledby="auth-title"
       class="relative z-50 w-full max-w-[420px] animate-modalIn
              rounded-modal border border-line bg-surface shadow-modal
              p-6 sm:p-8">

    <!-- Header -->
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h2 id="auth-title" class="text-xl font-semibold tracking-tight">Bienvenido a VOLT</h2>
        <p class="mt-1 text-sm text-ink2">Ingresá para continuar con tu compra.</p>
      </div>
      <button type="button" aria-label="Cerrar"
              class="grid h-9 w-9 shrink-0 place-items-center rounded-lg text-ink2
                     transition-colors duration-150 hover:bg-surface2 hover:text-ink
                     focus:outline-none focus-visible:shadow-focus cursor-pointer">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M6 6l12 12M18 6L6 18" />
        </svg>
      </button>
    </div>

    <!-- Tabs: segmented control -->
    <div class="relative mb-6 grid grid-cols-2 rounded-field bg-surface2 p-1 text-sm font-medium">
      <span id="tab-indicator" aria-hidden="true"
            class="absolute inset-y-1 left-1 w-[calc(50%-0.25rem)] rounded-[10px] bg-surface
                   shadow-[0_1px_0_0_rgba(255,255,255,.06),0_8px_20px_-12px_rgba(0,0,0,.8)]
                   ring-1 ring-line transition-transform duration-300 ease-soft"></span>
      <button type="button" data-tab="login" aria-pressed="true"
              class="tab relative z-10 rounded-[10px] py-2 text-ink transition-colors duration-200 cursor-pointer
                     focus:outline-none focus-visible:shadow-focus">Ingresar</button>
      <button type="button" data-tab="signup" aria-pressed="false"
              class="tab relative z-10 rounded-[10px] py-2 text-ink2 transition-colors duration-200 cursor-pointer
                     hover:text-ink focus:outline-none focus-visible:shadow-focus">Crear cuenta</button>
    </div>

    <!-- Form -->
    <form class="space-y-5" novalidate>

      <!-- Email -->
      <div>
        <label for="email" class="mb-2 block text-sm font-medium text-ink2">Email</label>
        <div class="group relative flex items-center rounded-field border border-line bg-surface2
                    transition-all duration-200
                    focus-within:border-accent focus-within:shadow-focus hover:border-lineStrong">
          <span class="pointer-events-none absolute left-3 text-ink3">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
            </svg>
          </span>
          <input id="email" name="email" type="email" autocomplete="email" inputmode="email"
                 placeholder="vos@email.com"
                 class="h-12 w-full rounded-field bg-transparent pl-11 pr-3 text-[15px] text-ink
                        placeholder:text-ink3 focus:outline-none" />
        </div>
      </div>

      <!-- Password -->
      <div>
        <div class="mb-2 flex items-center justify-between">
          <label for="password" class="block text-sm font-medium text-ink2">Contraseña</label>
          <a href="#" class="text-sm text-ink2 underline-offset-4 transition-colors duration-150
                              hover:text-ink hover:underline focus:outline-none focus-visible:text-ink">
            ¿La olvidaste?
          </a>
        </div>
        <div class="group relative flex items-center rounded-field border border-line bg-surface2
                    transition-all duration-200
                    focus-within:border-accent focus-within:shadow-focus hover:border-lineStrong">
          <span class="pointer-events-none absolute left-3 text-ink3">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
            </svg>
          </span>
          <input id="password" name="password" type="password" autocomplete="current-password"
                 placeholder="••••••••"
                 aria-describedby="pw-error"
                 class="h-12 w-full rounded-field bg-transparent pl-11 pr-11 text-[15px] text-ink
                        placeholder:text-ink3 focus:outline-none" />
          <button type="button" id="toggle-pw" aria-label="Mostrar contraseña" aria-pressed="false"
                  class="absolute right-2 grid h-8 w-8 place-items-center rounded-lg text-ink3
                         transition-colors duration-150 hover:bg-bg hover:text-ink2
                         focus:outline-none focus-visible:shadow-focus cursor-pointer">
            <svg data-eye class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Error (accesible) -->
        <p id="pw-error" role="alert" class="mt-2 hidden items-center gap-1.5 text-sm text-danger">
          <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>
          </svg>
          <span>Email o contraseña incorrectos. Probá de nuevo.</span>
        </p>
      </div>

      <!-- CTA principal -->
      <button type="submit" id="submit-btn"
              class="group relative flex h-12 w-full items-center justify-center gap-2
                     rounded-field text-[15px] font-semibold text-white
                     bg-gradient-to-b from-accentHover to-accent shadow-cta
                     transition-all duration-200
                     hover:-translate-y-px hover:brightness-110
                     active:translate-y-0 active:from-accentPress active:to-accentPress
                     focus:outline-none focus-visible:shadow-focus
                     disabled:cursor-not-allowed disabled:opacity-60 cursor-pointer">
        <svg data-spinner class="hidden h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 0 1 8-8v4a4 4 0 0 0-4 4H4Z"/>
        </svg>
        <span data-label>Ingresar</span>
      </button>

      <!-- Divisor -->
      <div class="flex items-center gap-3 py-1 text-xs text-ink3">
        <span class="h-px flex-1 bg-line"></span>
        <span>o continuá con</span>
        <span class="h-px flex-1 bg-line"></span>
      </div>

      <!-- Google -->
      <button type="button"
              class="flex h-12 w-full items-center justify-center gap-3 rounded-field
                     border border-line bg-surface2 text-[15px] font-medium text-ink
                     transition-all duration-200 hover:border-lineStrong hover:bg-[#1c1c1c]
                     focus:outline-none focus-visible:shadow-focus cursor-pointer">
        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/>
          <path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84Z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38Z"/>
        </svg>
        Continuar con Google
      </button>

      <p class="text-center text-xs leading-relaxed text-ink3">
        Si antes ingresaste con Google, usá el botón de arriba.
      </p>
    </form>
  </div>

  <script>
    // Tabs + indicador deslizante
    const tabs = document.querySelectorAll('.tab');
    const indicator = document.getElementById('tab-indicator');
    const title = document.getElementById('auth-title');
    const submitLabel = document.querySelector('#submit-btn [data-label]');
    tabs.forEach((tab, i) => tab.addEventListener('click', () => {
      tabs.forEach(t => { t.setAttribute('aria-pressed', 'false'); t.classList.replace('text-ink','text-ink2'); });
      tab.setAttribute('aria-pressed', 'true'); tab.classList.replace('text-ink2','text-ink');
      indicator.style.transform = i === 1 ? 'translateX(100%)' : 'translateX(0)';
      const signup = i === 1;
      title.textContent = signup ? 'Creá tu cuenta VOLT' : 'Bienvenido a VOLT';
      submitLabel.textContent = signup ? 'Crear cuenta' : 'Ingresar';
    }));

    // Toggle contraseña
    const toggle = document.getElementById('toggle-pw');
    const pw = document.getElementById('password');
    toggle.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      toggle.setAttribute('aria-pressed', String(show));
      toggle.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    // Demo: loading + error
    const form = document.querySelector('form');
    const btn = document.getElementById('submit-btn');
    const spinner = btn.querySelector('[data-spinner]');
    const err = document.getElementById('pw-error');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      btn.disabled = true; spinner.classList.remove('hidden'); err.classList.add('hidden');
      setTimeout(() => {
        btn.disabled = false; spinner.classList.add('hidden');
        err.classList.remove('hidden'); err.classList.add('flex');
        pw.closest('.group').classList.add('animate-shake', '!border-danger');
        setTimeout(() => pw.closest('.group').classList.remove('animate-shake'), 400);
      }, 1200);
    });
  </script>
</body>
</html>
