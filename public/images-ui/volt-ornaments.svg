<?xml version="1.0" encoding="UTF-8"?>
<!-- VOLT: gráfica decorativa vectorial (referencia visual del cliente, no se embebe PNG). Blanco sobre transparente para fondos oscuros. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" fill="none" stroke="#ffffff" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Zona A: grilla + distorsión -->
  <g opacity="0.95">
    <path d="M40 80h200v200H40z" stroke-width="0.9"/>
    <line x1="40" y1="120" x2="240" y2="120" stroke-width="0.55"/>
    <line x1="40" y1="160" x2="240" y2="160" stroke-width="0.55"/>
    <line x1="40" y1="200" x2="240" y2="200" stroke-width="0.55"/>
    <line x1="40" y1="240" x2="240" y2="240" stroke-width="0.55"/>
    <line x1="80" y1="80" x2="80" y2="280" stroke-width="0.55"/>
    <line x1="120" y1="80" x2="120" y2="280" stroke-width="0.55"/>
    <line x1="160" y1="80" x2="160" y2="280" stroke-width="0.55"/>
    <line x1="200" y1="80" x2="200" y2="280" stroke-width="0.55"/>
    <path d="M120 140 Q140 180 130 220 T150 260" stroke-width="0.85"/>
    <path d="M160 130 Q180 200 165 250" stroke-width="0.65" opacity="0.7"/>
  </g>
  <!-- Barcode + texto EXPLORE (geométrico) -->
  <g transform="translate(300 60)">
    <line x1="0" y1="0" x2="0" y2="200" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="200" stroke-width="1"/>
    <line x1="18" y1="0" x2="18" y2="200" stroke-width="3"/>
    <line x1="28" y1="0" x2="28" y2="200" stroke-width="1"/>
    <line x1="36" y1="0" x2="36" y2="200" stroke-width="2"/>
    <line x1="48" y1="0" x2="48" y2="200" stroke-width="1"/>
    <line x1="56" y1="0" x2="56" y2="200" stroke-width="4"/>
    <line x1="68" y1="0" x2="68" y2="200" stroke-width="1"/>
    <line x1="76" y1="0" x2="76" y2="200" stroke-width="2"/>
    <rect x="88" y="70" width="120" height="60" stroke-width="1"/>
    <path d="M98 110h100M98 100h100M98 90h100" stroke-width="0.6" opacity="0.5"/>
    <line x1="220" y1="0" x2="220" y2="200" stroke-width="2"/>
    <line x1="232" y1="0" x2="232" y2="200" stroke-width="1"/>
  </g>
  <!-- Anillos / óvalos -->
  <g transform="translate(520 100) rotate(-12)">
    <ellipse cx="0" cy="0" rx="120" ry="36" stroke-width="0.9"/>
    <ellipse cx="0" cy="0" rx="100" ry="30" stroke-width="0.7" opacity="0.75"/>
    <ellipse cx="0" cy="0" rx="80" ry="24" stroke-width="0.55" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="60" ry="18" stroke-width="0.45" opacity="0.4"/>
  </g>
  <!-- Batería + detalle -->
  <g transform="translate(720 120)">
    <rect x="0" y="20" width="44" height="72" rx="4" stroke-width="1.2"/>
    <path d="M14 20v-8h16v8" stroke-width="1"/>
    <path d="M22 44 L30 56 L18 68" stroke-width="1.1"/>
  </g>
  <!-- Espiral / @ -->
  <g transform="translate(820 200)">
    <path d="M0 0 C20 -20 40 0 20 20 S0 40 20 60" stroke-width="0.9"/>
    <circle cx="20" cy="30" r="24" stroke-width="0.7" opacity="0.5"/>
  </g>
  <!-- Diagonales -->
  <g transform="translate(40 380)">
    <line x1="0" y1="40" x2="180" y2="0" stroke-width="3" opacity="0.35"/>
    <line x1="20" y1="80" x2="200" y2="20" stroke-width="3" opacity="0.35"/>
    <line x1="40" y1="120" x2="220" y2="50" stroke-width="3" opacity="0.35"/>
  </g>
  <!-- Caja patrón -->
  <g transform="translate(260 400)">
    <rect x="0" y="0" width="48" height="48" stroke-width="0.9"/>
    <circle cx="24" cy="24" r="10" stroke-width="0.8"/>
    <rect x="56" y="0" width="48" height="48" stroke-width="0.9"/>
    <path d="M68 12 L92 36 M92 12 L68 36" stroke-width="0.9"/>
    <rect x="112" y="0" width="48" height="48" stroke-width="0.9"/>
    <line x1="124" y1="12" x2="148" y2="36" stroke-width="0.9"/>
    <rect x="168" y="0" width="48" height="48" stroke-width="0.9"/>
    <rect x="178" y="10" width="28" height="28" fill="none" stroke-width="0.9"/>
  </g>
  <!-- Flechas doble -->
  <g transform="translate(360 520)">
    <path d="M0 0h160M0 0l16-10M0 0l16 10" stroke-width="1"/>
    <path d="M200 0h-160M200 0l-16-10M200 0l16 10" stroke-width="1"/>
  </g>
  <!-- Globo wireframe -->
  <g transform="translate(620 360)">
    <circle cx="80" cy="80" r="78" stroke-width="0.85"/>
    <ellipse cx="80" cy="80" rx="78" ry="28" stroke-width="0.65" opacity="0.7"/>
    <ellipse cx="80" cy="80" rx="78" ry="52" stroke-width="0.55" opacity="0.45"/>
    <path d="M80 2v156M2 80h156" stroke-width="0.5" opacity="0.5"/>
    <path d="M18 30 Q80 80 142 30 M18 130 Q80 80 142 130" stroke-width="0.5" opacity="0.45"/>
  </g>
  <!-- Esfera ajedrezada (simplificada) -->
  <g transform="translate(880 400)">
    <circle cx="50" cy="50" r="48" stroke-width="0.9"/>
    <path d="M10 50h80M30 15 Q50 50 30 85 M70 15 Q50 50 70 85" stroke-width="0.55" opacity="0.6"/>
    <path d="M15 30h70M20 70h60" stroke-width="0.45" opacity="0.4"/>
  </g>
  <!-- Línea onda / splash abstracto -->
  <path d="M900 120 L920 100 L940 140 L960 90 L980 130 L1000 80" stroke-width="0.9" opacity="0.55"/>
</svg>
